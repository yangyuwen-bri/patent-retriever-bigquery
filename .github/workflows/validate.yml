name: validate-skill

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate structure
        run: |
          test -f SKILL.md
          test -f README.md
          test -f schemas/concept_scan.schema.json
          test -f schemas/query_plan.schema.json
          test -f schemas/retriever_result.schema.json

      - name: Compile scripts
        run: |
          python -m compileall -q scripts

      - name: Basic CLI help checks
        run: |
          python scripts/patent_search.py --help >/dev/null
          python scripts/build_query_plan.py --help >/dev/null
          python scripts/patent_search_plan.py --help >/dev/null
          python scripts/schema_check.py --help >/dev/null
